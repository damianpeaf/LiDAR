services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  lidar-server:
    build:
      context: ./services/lidar-server
    environment:
      REDIS_URL: redis://redis:6379/0
      NETWORK_TELEMETRY_CSV: /data/lidar-server/network_telemetry.csv
    ports:
      - "3000:3000"
    volumes:
      - ./data/services/lidar-server:/data/lidar-server
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
